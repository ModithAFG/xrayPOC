name: Run BDD Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    env: 
      ENV: "QA"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Run BDD tests
      id: bdd-tests
      run: npm run test:bdd || npm run test:rerun

    - name: Parse test results
      if: success() || failure()
      id: test-results
      run: |
        if [ -f test-results/cucumber-report.json ]; then
          TOTAL=$(node -e "const r=require('./test-results/cucumber-report.json'); let p=0,f=0,s=0; r.forEach(f2 => f2.elements?.forEach(e => e.steps?.forEach(st => { if(st.result.status==='passed') p++; else if(st.result.status==='failed') f++; else s++; }))); console.log(p+f+s);")
          PASSED=$(node -e "const r=require('./test-results/cucumber-report.json'); let p=0; r.forEach(f2 => f2.elements?.forEach(e => e.steps?.forEach(st => { if(st.result.status==='passed') p++; }))); console.log(p);")
          FAILED=$(node -e "const r=require('./test-results/cucumber-report.json'); let f=0; r.forEach(f2 => f2.elements?.forEach(e => e.steps?.forEach(st => { if(st.result.status==='failed') f++; }))); console.log(f);")
          SKIPPED=$(node -e "const r=require('./test-results/cucumber-report.json'); let s=0; r.forEach(f2 => f2.elements?.forEach(e => e.steps?.forEach(st => { if(st.result.status!=='passed' && st.result.status!=='failed') s++; }))); console.log(s);")
          SCENARIOS=$(node -e "const r=require('./test-results/cucumber-report.json'); let t=0; r.forEach(f2 => f2.elements?.forEach(() => t++)); console.log(t);")
          FEATURES=$(node -e "const r=require('./test-results/cucumber-report.json'); console.log(r.length);")
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT
          echo "scenarios=$SCENARIOS" >> $GITHUB_OUTPUT
          echo "features=$FEATURES" >> $GITHUB_OUTPUT
        else
          echo "total=0" >> $GITHUB_OUTPUT
          echo "passed=0" >> $GITHUB_OUTPUT
          echo "failed=0" >> $GITHUB_OUTPUT
          echo "skipped=0" >> $GITHUB_OUTPUT
          echo "scenarios=0" >> $GITHUB_OUTPUT
          echo "features=0" >> $GITHUB_OUTPUT
        fi



    - name: Notify dedicated teams channel
      if: success() || failure()
      env:
        WEBHOOK_URL: "https://afgtest.webhook.office.com/webhookb2/526935bf-3267-4f9e-a896-31a73dac597e@f7a3baa7-fae3-415b-b481-a71ed92d3103/IncomingWebhook/cfae1b3a8ab24238b7a9c5e95eb1b560/fddd096f-a6ac-4669-a86e-83a4d17b38a4/V2M-or91x-1APxfGbwSCuCecVYAcm7pgIDj1Tsh6jJPAw1"
      run: |
        if [ "${{ job.status }}" = "success" ]; then
          COLOR="28a745"
          ICON="✅"
          STATUS="PASSED"
        else
          COLOR="dc3545"
          ICON="❌"
          STATUS="FAILED"
        fi

        PAYLOAD=$(cat <<'INNEREOF'
        {
          "@type": "MessageCard",
          "@context": "http://schema.org/extensions",
          "themeColor": "COLOR_PLACEHOLDER",
          "text": "**ICON_PLACEHOLDER BDD Test Run: STATUS_PLACEHOLDER** | Env: ENV_PLACEHOLDER | Branch: BRANCH_PLACEHOLDER<br><br>📊 **Features:** FEATURES_PLACEHOLDER | **Scenarios:** SCENARIOS_PLACEHOLDER<br>✅ **Passed:** PASSED_PLACEHOLDER | ❌ **Failed:** FAILED_PLACEHOLDER | ⏭️ **Skipped:** SKIPPED_PLACEHOLDER | **Total Steps:** TOTAL_PLACEHOLDER<br><br>👤 **Triggered by:** ACTOR_PLACEHOLDER | **Commit:** COMMIT_PLACEHOLDER<br><br>[View Workflow Run](RUN_URL_PLACEHOLDER) | [View Commit](COMMIT_URL_PLACEHOLDER)"
        }
        INNEREOF
        )

        PAYLOAD=$(echo "$PAYLOAD" | sed "s|COLOR_PLACEHOLDER|${COLOR}|g")
        PAYLOAD=$(echo "$PAYLOAD" | sed "s|ICON_PLACEHOLDER|${ICON}|g")
        PAYLOAD=$(echo "$PAYLOAD" | sed "s|STATUS_PLACEHOLDER|${STATUS}|g")
        PAYLOAD=$(echo "$PAYLOAD" | sed "s|ENV_PLACEHOLDER|${{ env.ENV }}|g")
        PAYLOAD=$(echo "$PAYLOAD" | sed "s|BRANCH_PLACEHOLDER|${{ github.ref_name }}|g")
        PAYLOAD=$(echo "$PAYLOAD" | sed "s|FEATURES_PLACEHOLDER|${{ steps.test-results.outputs.features }}|g")
        PAYLOAD=$(echo "$PAYLOAD" | sed "s|SCENARIOS_PLACEHOLDER|${{ steps.test-results.outputs.scenarios }}|g")
        PAYLOAD=$(echo "$PAYLOAD" | sed "s|PASSED_PLACEHOLDER|${{ steps.test-results.outputs.passed }}|g")
        PAYLOAD=$(echo "$PAYLOAD" | sed "s|FAILED_PLACEHOLDER|${{ steps.test-results.outputs.failed }}|g")
        PAYLOAD=$(echo "$PAYLOAD" | sed "s|SKIPPED_PLACEHOLDER|${{ steps.test-results.outputs.skipped }}|g")
        PAYLOAD=$(echo "$PAYLOAD" | sed "s|TOTAL_PLACEHOLDER|${{ steps.test-results.outputs.total }}|g")
        PAYLOAD=$(echo "$PAYLOAD" | sed "s|ACTOR_PLACEHOLDER|${{ github.actor }}|g")
        PAYLOAD=$(echo "$PAYLOAD" | sed "s|COMMIT_PLACEHOLDER|$(echo ${{ github.sha }} | cut -c1-7)|g")
        PAYLOAD=$(echo "$PAYLOAD" | sed "s|RUN_URL_PLACEHOLDER|https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|g")
        PAYLOAD=$(echo "$PAYLOAD" | sed "s|COMMIT_URL_PLACEHOLDER|https://github.com/${{ github.repository }}/commit/${{ github.sha }}|g")

        curl -s -H "Content-Type: application/json" -d "$PAYLOAD" "$WEBHOOK_URL"

   

