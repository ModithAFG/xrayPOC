name: Run BDD Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    env: 
      ENV: "QA"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Run BDD tests
      id: bdd-tests
      run: npm run test:bdd || npm run test:rerun

    - name: Parse test results
      if: success() || failure()
      id: test-results
      run: |
        if [ -f test-results/cucumber-report.json ]; then
          node -e "
            const r = require('./test-results/cucumber-report.json');
            const fs = require('fs');
            let scenariosPassed=0, scenariosFailed=0, scenariosTotal=0;
            let stepsPassed=0, stepsFailed=0, stepsSkipped=0, stepsTotal=0;
            let totalDuration=0;
            r.forEach(f => f.elements?.forEach(e => {
              scenariosTotal++;
              let scenarioFailed = false;
              e.steps?.forEach(st => {
                if (st.hidden) return;
                stepsTotal++;
                totalDuration += (st.result.duration || 0);
                if (st.result.status === 'passed') stepsPassed++;
                else if (st.result.status === 'failed') { stepsFailed++; scenarioFailed = true; }
                else stepsSkipped++;
              });
              if (scenarioFailed) scenariosFailed++; else scenariosPassed++;
            }));
            const secs = (totalDuration / 1e9).toFixed(3);
            const scenarioDetails = [];
            if (scenariosFailed) scenarioDetails.push(scenariosFailed + ' failed');
            if (scenariosPassed) scenarioDetails.push(scenariosPassed + ' passed');
            const stepDetails = [];
            if (stepsFailed) stepDetails.push(stepsFailed + ' failed');
            if (stepsSkipped) stepDetails.push(stepsSkipped + ' skipped');
            if (stepsPassed) stepDetails.push(stepsPassed + ' passed');
            const summary = scenariosTotal + ' scenario(s) (' + scenarioDetails.join(', ') + ') | ' +
              stepsTotal + ' steps (' + stepDetails.join(', ') + ') | ' + secs + 's';
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'summary=' + summary + '\n');
          "
        else
          echo "summary=No test results found" >> $GITHUB_OUTPUT
        fi



    - name: Notify dedicated teams channel
      if: success() || failure()
      uses: jdcargile/ms-teams-notification@v1.4
      with:
        github-token: ${{ github.token }}
        ms-teams-webhook-uri: https://afgtest.webhook.office.com/webhookb2/526935bf-3267-4f9e-a896-31a73dac597e@f7a3baa7-fae3-415b-b481-a71ed92d3103/IncomingWebhook/cfae1b3a8ab24238b7a9c5e95eb1b560/fddd096f-a6ac-4669-a86e-83a4d17b38a4/V2M-or91x-1APxfGbwSCuCecVYAcm7pgIDj1Tsh6jJPAw1
        notification-summary: "**BDD Test Run: ${{ job.status == 'success' && '✅ PASSED' || '❌ FAILED' }}** | Env: ${{ env.ENV }} | Branch: ${{ github.ref_name }}<br>${{ steps.test-results.outputs.summary }}"
        notification-color: ${{ job.status == 'success' && '28a745' || 'dc3545' }}
        verbose-logging: true

   

